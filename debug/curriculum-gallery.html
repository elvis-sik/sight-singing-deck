<script>
window.addEventListener('load', function(){
  document.querySelectorAll('.notation').forEach(function(el){
    try {
      var data = window.SightSingingNormalizeData(JSON.parse(el.getAttribute('data-json')));
      window.SightSingingDrawStaff(el, data, {width: 300});
    } catch(e){ el.textContent = 'ERR: '+e.message; }
  });
});
</script></body></html>
